<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanScribe - Event</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css?v=10">
    <link rel="stylesheet" href="/static/css/event_detail.css?v=6">
    <link rel="stylesheet" href="/static/css/audio-player.css">
</head>
<body class="event-detail-page dashboard-page">
    <div class="container">
        <header class="flex-between mb-4">
            <div class="flex-gap">
                <h1 class="text-hero">ScanScribe</h1>
                <nav class="flex-gap ml-8">
                    <a href="/dashboard" class="nav-link">Dashboard</a>
                    <a href="/insights" class="nav-link">Insights</a>
                    <a href="/logs" class="nav-link">Database</a>
                    <a href="/events" class="nav-link active">Events</a>
                    <a href="/users" class="nav-link">Users</a>
                    <a href="/settings" class="nav-link">Settings</a>
                </nav>
            </div>
            <div class="flex-gap">
                <span id="currentUser" class="text-caption"></span>
                <button id="logoutBtn" type="button" class="btn btn-ghost">Logout</button>
            </div>
        </header>

        <nav class="ed-breadcrumb" aria-label="Breadcrumb">
            <a href="/events" class="ed-breadcrumb-link">← Events</a>
        </nav>

        <div id="eventLoading" class="ed-loading" role="status">
            <span class="ed-loading-dot" aria-hidden="true"></span>
            Loading incident…
        </div>
        <div id="eventError" class="ed-error hidden" role="alert"></div>

        <div id="eventContent" class="hidden">
            <div class="ed-actions-bar">
                <div class="ed-actions-bar-inner">
                    <button type="button" id="eventCloseBtn" class="btn ed-action-close hidden">Close incident</button>
                    <button type="button" id="eventDeleteBtn" class="btn ed-action-delete">Delete event</button>
                </div>
            </div>

            <section class="glass-panel ed-section">
                <div class="ed-section-head">
                    <h2 class="ed-section-title">Incident overview</h2>
                </div>
                <div id="eventHeaderHero" class="ed-header-hero"></div>
                <div id="eventHeader"></div>
            </section>

            <section class="glass-panel ed-section">
                <div class="ed-section-head">
                    <h2 class="ed-section-title">Linked transcripts</h2>
                    <p class="ed-section-desc">Chronological spans attached to this incident. Trigger = span that opened or was primary for the event.</p>
                </div>
                <div id="eventTranscripts" class="ed-transcripts"></div>
            </section>
        </div>
    </div>
    <script src="/static/js/event_detail.js?v=7"></script>
</body>
</html>
