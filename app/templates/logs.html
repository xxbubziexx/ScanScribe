<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ScanScribe - Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="/static/css/dashboard.css?v=4">
    <link rel="stylesheet" href="/static/css/logs.css">
    <link rel="stylesheet" href="/static/css/audio-player.css">
    <link rel="stylesheet" href="/static/css/flatpickr-dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body class="text-gray-100 logs-page">
    <div class="container">
        
        <!-- Header -->
        <header class="flex-between mb-4">
            <div class="flex-gap">
                <h1 class="text-hero">ScanScribe</h1>
                <nav class="flex-gap ml-8">
                    <a href="/dashboard" class="nav-link">Dashboard</a>
                    <a href="/insights" class="nav-link">Insights</a>
                    <a href="/logs" class="nav-link active">Database</a>
                    <a href="/events" class="nav-link">Events</a>
                    <a href="/users" class="nav-link">Users</a>
                    <a href="/settings" class="nav-link">Settings</a>
                </nav>
            </div>
            <div class="flex-gap">
                <span id="currentUser" class="text-caption"></span>
                <button id="logoutBtn" class="btn btn-ghost">Logout</button>
            </div>
        </header>

        <!-- Filters -->
        <section class="glass-panel mb-4" style="flex-shrink: 0;">
            <div class="flex-between">
                <div class="flex-gap">
                    <input type="text" id="searchInput" class="input" placeholder="Search..." style="min-width: 200px;">
                    <input type="text" id="filterDate" class="input" placeholder="Filter Date" style="min-width: 150px;">
                    <button id="searchBtn" class="btn btn-primary">Search</button>
                    <button id="clearFiltersBtn" class="btn btn-ghost">Clear</button>
                    
                    <!-- Bulk Actions -->
                    <div id="bulkActions" class="bulk-actions">
                        <span class="text-caption"><span id="selectedCount">0</span> selected</span>
                        <span class="bulk-download-wrap" style="display: flex; align-items: center; gap: 0.5rem;">
                            <button id="bulkDownloadBtn" class="db-download-btn">Download ZIP</button>
                            <span id="bulkDownloadStatus" class="bulk-download-status" style="display: none;" aria-live="polite"></span>
                        </span>
                        <button id="bulkDeleteBtn" class="db-delete-btn">Delete Selected</button>
                    </div>
                </div>
                
                <div class="flex-gap">
                    <button id="exportBtn" class="btn btn-ghost">Export CSV</button>
                    <span id="resultCount" class="text-caption">0 results</span>
                </div>
            </div>
        </section>

        <!-- Database Table -->
        <section class="glass-panel" style="flex: 1; display: flex; flex-direction: column;">
            <div class="flex-between mb-4">
                <h2 class="text-title">Database Editor</h2>
                <select id="sortBy" class="input" style="width: auto;">
                    <option value="timestamp_desc">Newest First</option>
                    <option value="timestamp_asc">Oldest First</option>
                    <option value="filename">Filename A-Z</option>
                    <option value="talkgroup">Talkgroup</option>
                </select>
            </div>
            
            <div style="flex: 1; overflow: auto;">
                <table class="db-table">
                    <thead style="position: sticky; top: 0; background: var(--grey-bg);">
                        <tr>
                            <th style="width: 30px;"><input type="checkbox" id="selectAll" class="db-checkbox" title="Select All"></th>
                            <th>ID</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Filename</th>
                            <th>Talkgroup</th>
                            <th>Transcript</th>
                            <th>Duration</th>
                            <th>Confidence</th>
                            <th>Audio</th>
                            <th style="width: 80px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="logsTableBody">
                        <tr>
                            <td colspan="11" style="padding: 2rem; text-align: center; color: var(--grey-text-muted);">
                                Loading database entries...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div class="flex-between mt-4" style="padding-top: 1rem; border-top: 1px solid var(--grey-border);">
                <div class="text-caption">
                    Showing <span id="showingStart">0</span>-<span id="showingEnd">0</span> of <span id="totalLogs">0</span>
                </div>
                <div class="flex-gap">
                    <button id="prevPage" class="btn btn-ghost" disabled>Previous</button>
                    <span id="currentPage" class="text-caption">Page 1</span>
                    <button id="nextPage" class="btn btn-ghost" disabled>Next</button>
                </div>
            </div>
        </section>

    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="confirm-modal hidden">
        <div class="confirm-dialog">
            <h3 class="text-title mb-4" id="confirmTitle">Confirm Delete</h3>
            <p class="text-body mb-4" id="confirmMessage">Are you sure you want to delete this entry?</p>
            <div class="flex-gap" style="justify-content: flex-end;">
                <button id="confirmCancel" class="btn btn-ghost">Cancel</button>
                <button id="confirmOk" class="db-delete-btn">Delete</button>
            </div>
        </div>
    </div>

    <script src="/static/js/audio-player.js"></script>
    <script src="/static/js/logs.js?v=3"></script>
</body>
</html>
